<p>cart works!</p>
<div class="container mt-4">
  <h2 class="mb-4 text-center">Shopping cart</h2>
  <table class="table table-bordered align-middle">
    <thead class="table-light">
      <tr>
        <th>Remove</th>
        <th>SKU</th>
        <th>Image</th>
        <th>Product(s)</th>
        <th>Price</th>
        <th>Qty.</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of cart">
        <td class="text-center">
          <input type="checkbox" [(ngModel)]="item.selected">
        </td>
        <td>{{item.sku}}</td>
        <td><img [src]="item.image" width="70"></td>
        <td>{{item.name}}</td>
        <td>{{item.price | number}}$</td>
        <td>
          <input type="number" class="form-control" style="width: 70px;" [(ngModel)]="item.qty" (change)="checkQty(item)">
        </td>
        <td>{{(item.price * item.qty) | number}}$</td>
      </tr>
      <tr *ngIf="cart.length === 0">
        <td colspan="7" class="text-center">Your cart is empty</td>
      </tr>
    </tbody>
  </table>

  <div class="d-flex justify-content-end gap-2 mt-3">
    <button class="btn btn-info text-white" (click)="updateCart()">Update shopping cart</button>
    <button class="btn btn-secondary" (click)="continueShopping()">Continue shopping</button>
  </div>
</div>
